<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sudoku core tests</title>
  <style>
    body { font-family: monospace; padding: 1.5rem; background: #111; color: #eee; }
    .pass { color: #4fae93; }
    .fail { color: #e08272; font-weight: bold; }
    li { margin-bottom: 0.25rem; }
  </style>
</head>
<body>
  <h1>Sudoku core tests</h1>
  <ul id="results"></ul>

  <script type="module">
    import { generateSolution, countSolutions } from "../puzzles/sudoku/js/core.js";
    import { generatePuzzle, DIFFICULTY_CLUES, DIFFICULTIES } from "../puzzles/sudoku/js/difficulty.js";
    import { getConflicts, isSolved } from "../puzzles/sudoku/js/validation.js";

    const results = document.getElementById("results");
    let failures = 0;

    function assert(condition, message) {
      const li = document.createElement("li");
      li.className = condition ? "pass" : "fail";
      li.textContent = (condition ? "PASS: " : "FAIL: ") + message;
      results.appendChild(li);
      console.assert(condition, message);
      if (!condition) failures += 1;
    }

    function countValue(entries, value) {
      return entries.filter((v) => v === value).length;
    }

    // --- generateSolution ---
    const solution = generateSolution();
    assert(solution.length === 81, "generateSolution returns 81 cells");
    assert(solution.every((v) => v >= 1 && v <= 9), "generateSolution has no blanks, all digits 1-9");
    assert(getConflicts(solution).size === 0, "generateSolution produces a conflict-free (valid) grid");
    for (let d = 1; d <= 9; d++) {
      assert(countValue(solution, d) === 9, `digit ${d} appears exactly 9 times in the solution`);
    }

    // --- generatePuzzle per difficulty ---
    // Clue count is a target, not a guarantee: maintaining a unique solution
    // can force the digger to stop slightly above target (see difficulty.js).
    const CLUE_TOLERANCE = 3;
    for (const difficulty of DIFFICULTIES) {
      const { givens, solution: puzzleSolution } = generatePuzzle(difficulty);
      const clueCount = givens.filter((v) => v !== 0).length;
      assert(
        clueCount <= DIFFICULTY_CLUES[difficulty] + CLUE_TOLERANCE,
        `${difficulty} puzzle is within ${CLUE_TOLERANCE} of its ${DIFFICULTY_CLUES[difficulty]}-clue target (got ${clueCount})`
      );
      assert(clueCount >= 17, `${difficulty} puzzle respects the 17-clue floor`);

      const matchesSolution = givens.every((v, i) => v === 0 || v === puzzleSolution[i]);
      assert(matchesSolution, `${difficulty} givens are a subset of the solution`);

      assert(getConflicts(puzzleSolution).size === 0, `${difficulty} solution itself is conflict-free`);

      const solutionCount = countSolutions(givens, 2);
      assert(solutionCount === 1, `${difficulty} puzzle has a unique solution (found ${solutionCount})`);
    }

    // --- getConflicts ---
    const noConflicts = new Array(81).fill(0);
    noConflicts[0] = 5;
    noConflicts[1] = 3;
    assert(getConflicts(noConflicts).size === 0, "getConflicts: distinct values in a row report no conflicts");

    const rowConflict = new Array(81).fill(0);
    rowConflict[0] = 7;
    rowConflict[3] = 7; // same row (row 0), different value elsewhere
    assert(getConflicts(rowConflict).size === 2, "getConflicts: duplicate in same row is detected");

    const colConflict = new Array(81).fill(0);
    colConflict[0] = 4;
    colConflict[9] = 4; // same column (col 0), row 1
    assert(getConflicts(colConflict).size === 2, "getConflicts: duplicate in same column is detected");

    const boxConflict = new Array(81).fill(0);
    boxConflict[0] = 9;
    boxConflict[10] = 9; // row 1, col 1 -> same 3x3 box as (0,0)
    assert(getConflicts(boxConflict).size === 2, "getConflicts: duplicate in same box is detected");

    // --- isSolved ---
    assert(isSolved(solution) === true, "isSolved: a complete valid solution is solved");
    const incomplete = solution.slice();
    incomplete[0] = 0;
    assert(isSolved(incomplete) === false, "isSolved: a grid with a blank is not solved");
    assert(isSolved(rowConflict) === false, "isSolved: a grid with conflicts is not solved");

    const summary = document.createElement("h2");
    summary.textContent = failures === 0 ? `All tests passed` : `${failures} test(s) failed`;
    summary.className = failures === 0 ? "pass" : "fail";
    document.body.appendChild(summary);
  </script>
</body>
</html>
